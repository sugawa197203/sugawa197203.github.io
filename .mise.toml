[tools]
node = "22"

[env]
_.path = ["./node_modules/.bin"]
# Must match the production GitHub Actions variable (vars.SITE_DOMAIN) so local
# builds produce the same canonical URLs. The GitHub Pages custom domain is the
# www host (apex sugawa.dev 301-redirects to www.sugawa.dev).
SITE_DOMAIN = "www.sugawa.dev"

[tasks.install]
description = "Install dependencies"
run = "npm install"

[tasks.dev]
description = "Run Astro dev server"
run = "astro dev"

[tasks.build]
description = "Build site to ./dist for GitHub Pages"
run = "astro build"

[tasks.preview]
description = "Preview the built site locally"
run = "astro preview"
depends = ["build"]

[tasks.check]
description = "Type-check the project"
run = "astro check"
