[tools]
node = "22"

[env]
_.path = ["./node_modules/.bin"]
SITE_DOMAIN = "sugawa.dev"

[tasks.install]
description = "Install dependencies"
run = "npm install"

[tasks.dev]
description = "Run Astro dev server"
run = "astro dev"

[tasks.build]
description = "Build site to ./dist for GitHub Pages"
run = "astro build"

[tasks.preview]
description = "Preview the built site locally"
run = "astro preview"
depends = ["build"]

[tasks.check]
description = "Type-check the project"
run = "astro check"
